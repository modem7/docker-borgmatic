when:
  - event: [push, manual]
    branch: master
    path:
      # Scoped to what actually gets COPYed into the image in the Dockerfile —
      # docs/CI-only changes elsewhere shouldn't trigger a rebuild/republish.
      include:
        - Dockerfile
        - requirements.txt
        - root/**
        - .woodpecker.yml

steps:
  - name: lint-dockerfile
    image: hadolint/hadolint:latest-alpine
    commands:
      - hadolint --version
      - hadolint Dockerfile

  # Derives image tags from the pinned borgmatic/borg versions in
  # requirements.txt (e.g. "latest" + "2.1.6-1.4.4") so published tags
  # track what's actually in the image, not just a floating "latest".
  # plugin-docker-buildx's tags_file splits strictly on newline, not
  # comma (unlike thegeeklab/drone-docker-buildx, which this repo's old
  # .drone.yml worked around by writing a single comma-separated line).
  - name: prepare-tags
    image: alpine
    commands:
      - borgmatic_ver=$(grep 'borgmatic' requirements.txt | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+')
      - borg_ver=$(grep 'borgbackup' requirements.txt | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+')
      - printf "latest\n%s-%s\n" "$borgmatic_ver" "$borg_ver" > .tags
      - echo "Tags to publish:" && cat .tags

  - name: build-and-push
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    depends_on: [lint-dockerfile, prepare-tags]
    settings:
      repo: modem7/borgmatic-docker
      dockerfile: Dockerfile
      context: .
      purge: true
      build_args:
        BUILDKIT_INLINE_CACHE: "1"
      cache_from:
        - type=registry\,ref=modem7/borgmatic-docker:latest
      platforms: linux/amd64,linux/arm64
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      tags_file: .tags

  - name: pushrm-dockerhub
    image: chko/docker-pushrm
    depends_on:
      - build-and-push
    environment:
      DOCKER_USER:
        from_secret: docker_username
      DOCKER_PASS:
        from_secret: docker_password
      PUSHRM_FILE: README.md
      PUSHRM_SHORT: Multiarch Borgmatic Docker image with S6 overlay, Apprise notifications, and optional Docker CLI
      PUSHRM_TARGET: modem7/borgmatic-docker
    when:
      - status: [success]

  # Single dynamic-status notifier, replacing notify-slack-success/failure.
  # CI_PIPELINE_STATUS must stay bare ($VAR, not ${VAR}) - Woodpecker
  # resolves ${VAR} at compile time, before this value exists
  # (woodpecker-ci/woodpecker#6826).
  - name: notify-slack
    image: alpine
    depends_on:
      - build-and-push
    environment:
      SLACK_WEBHOOK:
        from_secret: slack_hook
    commands:
      - apk add --no-cache curl jq >/dev/null
      - COMMIT_SHORT=$(echo "$CI_COMMIT_SHA" | cut -c1-10)
      - >
        PAYLOAD=$(jq -n
        --arg status "$CI_PIPELINE_STATUS"
        --arg branch "$CI_COMMIT_BRANCH"
        --arg output "${CI_REPO}#${CI_PIPELINE_NUMBER}"
        --arg output_url "$CI_PIPELINE_URL"
        --arg build "$CI_PIPELINE_NUMBER"
        --arg commit "$COMMIT_SHORT"
        --arg commit_url "$CI_PIPELINE_FORGE_URL"
        --arg author "$CI_COMMIT_AUTHOR"
        --arg message "$CI_COMMIT_MESSAGE"
        '{attachments:[{color:(if $status == "success" then "good" else "danger" end),fields:[
        {title:"Status",value:$status,short:true},
        {title:"Branch",value:$branch,short:true},
        {title:"Output",value:("<"+$output_url+"|"+$output+">"),short:true},
        {title:"Build Number",value:$build,short:true},
        {title:"Commit",value:("<"+$commit_url+"|"+$commit+">"),short:true},
        {title:"Author",value:$author,short:true},
        {title:"Commit Message",value:$message,short:false}
        ]}]}')
      - >
        curl -fsS -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK"
    when:
      - status: [success, failure]
